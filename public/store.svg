<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" role="img" aria-label="Illustration of an online store front" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f2e2b"/>
      <stop offset="1" stop-color="#20201f"/>
    </linearGradient>
    <linearGradient id="awning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b7c75"/>
      <stop offset="1" stop-color="#075e59"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6c78d" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#c98a24" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <rect width="600" height="450" fill="url(#sky)"/>

  <!-- soft window glow -->
  <circle cx="300" cy="150" r="220" fill="#c98a24" opacity="0.10"/>

  <!-- storefront base -->
  <rect x="90" y="150" width="420" height="240" rx="10" fill="#26251f"/>
  <rect x="90" y="150" width="420" height="240" rx="10" fill="none" stroke="rgba(255,255,255,0.10)"/>

  <!-- window -->
  <rect x="120" y="210" width="360" height="150" rx="8" fill="url(#glow)" opacity="0.18"/>
  <rect x="120" y="210" width="360" height="150" rx="8" fill="none" stroke="rgba(230,199,141,0.4)"/>
  <line x1="300" y1="210" x2="300" y2="360" stroke="rgba(230,199,141,0.3)" stroke-width="2"/>
  <line x1="120" y1="285" x2="480" y2="285" stroke="rgba(230,199,141,0.3)" stroke-width="2"/>

  <!-- awning -->
  <path d="M70 150 L530 150 L500 110 L100 110 Z" fill="url(#awning)"/>
  <g fill="rgba(255,255,255,0.16)">
    <path d="M100 110 L130 150 L160 150 L130 110 Z"/>
    <path d="M190 110 L220 150 L250 150 L220 110 Z"/>
    <path d="M280 110 L310 150 L340 150 L310 110 Z"/>
    <path d="M370 110 L400 150 L430 150 L400 110 Z"/>
  </g>

  <!-- shop sign -->
  <rect x="240" y="70" width="120" height="30" rx="6" fill="#26251f" stroke="rgba(230,199,141,0.5)"/>
  <circle cx="270" cy="85" r="5" fill="#e6c78d"/>
  <rect x="288" y="80" width="58" height="5" rx="2.5" fill="rgba(248,245,237,0.8)"/>
  <rect x="288" y="90" width="40" height="4" rx="2" fill="rgba(248,245,237,0.45)"/>

  <!-- cart -->
  <g transform="translate(250 300)" stroke="#e6c78d" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 0 L14 0 L26 56 L84 56 L96 16 L22 16"/>
    <circle cx="34" cy="74" r="8" fill="#e6c78d"/>
    <circle cx="78" cy="74" r="8" fill="#e6c78d"/>
  </g>
</svg>
