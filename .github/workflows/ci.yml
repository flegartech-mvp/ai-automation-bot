name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Syntax check
        run: node --check server.js
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Smoke tests (Playwright auto-starts the server)
        run: npm test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t ai-automation-bot:ci .
